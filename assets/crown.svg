<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 230" width="280" height="230">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE866"/>
      <stop offset="48%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#B87800"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD200"/>
      <stop offset="100%" stop-color="#9A6000"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="36%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFACC"/>
      <stop offset="35%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#9A6000"/>
    </radialGradient>
  </defs>

  <!-- Crown body -->
  <path d="M 18,210 L 18,155 L 62,67 L 97,125 L 140,35 L 183,125 L 218,67 L 262,155 L 262,210 Z"
        fill="url(#bodyGrad)" stroke="#7A4800" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Base band -->
  <rect x="16" y="180" width="248" height="32" rx="7"
        fill="url(#baseGrad)" stroke="#7A4800" stroke-width="6"/>

  <!-- Base band highlight -->
  <rect x="26" y="185" width="228" height="9" rx="4"
        fill="rgba(255,235,80,0.40)"/>

  <!-- Left peak ball -->
  <circle cx="62" cy="67" r="16" fill="url(#ballGrad)" stroke="#7A4800" stroke-width="5"/>
  <circle cx="56" cy="61" r="5" fill="rgba(255,255,255,0.65)"/>

  <!-- Center peak ball (largest) -->
  <circle cx="140" cy="35" r="19" fill="url(#ballGrad)" stroke="#7A4800" stroke-width="5"/>
  <circle cx="133" cy="28" r="6" fill="rgba(255,255,255,0.65)"/>

  <!-- Right peak ball -->
  <circle cx="218" cy="67" r="16" fill="url(#ballGrad)" stroke="#7A4800" stroke-width="5"/>
  <circle cx="212" cy="61" r="5" fill="rgba(255,255,255,0.65)"/>
</svg>
